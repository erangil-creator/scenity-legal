<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenity — Legal</title>
<style>
  :root { --red: #8B0000; --text: #1a1a1a; --muted: #666; --border: #e5e0e0; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    line-height: 1.6;
  }
  header { background: var(--red); color: #fff; padding: 36px 24px; }
  header .inner { max-width: 640px; margin: 0 auto; }
  header h1 { margin: 0; font-size: 26px; }
  header p { margin: 6px 0 0; opacity: .85; font-size: 15px; }
  main { max-width: 640px; margin: 0 auto; padding: 40px 24px 80px; }
  a.card {
    display: block;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    margin: 16px 0;
    text-decoration: none;
    color: var(--text);
    transition: border-color .15s ease;
  }
  a.card:hover { border-color: var(--red); }
  a.card .title { color: var(--red); font-weight: 600; font-size: 18px; }
  a.card .desc { color: var(--muted); font-size: 14px; margin-top: 4px; }
  footer { max-width: 640px; margin: 0 auto; padding: 24px; color: var(--muted); font-size: 13px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <div class="inner">
    <h1>Scenity</h1>
    <p>Legal documents</p>
  </div>
</header>
<main>
  <a class="card" href="https://legal.scenity.app/privacy.html">
    <div class="title">Privacy Policy</div>
    <div class="desc">How Scenity collects, uses, and protects your information.</div>
  </a>
  <a class="card" href="https://legal.scenity.app/terms.html">
    <div class="title">Terms of Service</div>
    <div class="desc">The agreement that governs your use of Scenity.</div>
  </a>
</main>
<footer>Scenity · privacy@scenity.app</footer>
</body>
</html>
